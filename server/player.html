<!DOCTYPE html>
<html>
<head>
    <title>HMI Live Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        video { width: 85%; border: 2px solid #333; }
        .info { margin-top: 10px; color: #888; }
    </style>
</head>
<body>
    <video id="video" controls autoplay muted></video>
    <div class="info">Status: <span id="state">Connecting...</span></div>

    <script>
        var video = document.getElementById('video');
        var state = document.getElementById('state');
        
        var hlsConfig = {
            liveSyncDurationCount: 5,    // Buffer exactly 5 segments (5 seconds)
            maxLiveSyncPlaybackRate: 1,  // NEVER play faster than 1x speed
            lowLatencyMode: false,       // Use standard HLS for more stability
            enableWorker: true
        };

        if (Hls.isSupported()) {
            var hls = new Hls(hlsConfig);
            hls.loadSource('stream/stream.m3u8');
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
                state.innerText = "Streaming";
            });
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    state.innerText = "Waiting for data...";
                    setTimeout(() => hls.loadSource('stream/stream.m3u8'), 2000);
                }
            });
        }
    </script>
</body>
</html>
